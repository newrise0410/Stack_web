# Render Blueprint — 백엔드(Express) 웹 서비스.
# Render 대시보드에서 "New +" → "Blueprint"로 이 저장소를 연결하면 자동 인식.
# MONGODB_URI / JWT_SECRET / CLIENT_ORIGIN 은 대시보드에서 직접 입력(sync:false).
services:
  - type: web
    name: stacknstak-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Seoul # 대시보드/주문 필터의 '오늘·이달' 경계를 KST 기준으로
      - key: MONGODB_URI
        sync: false # MongoDB Atlas 연결 문자열
      - key: JWT_SECRET
        sync: false # 긴 랜덤 문자열
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false # Vercel 프론트 도메인 (예: https://stacknstak.vercel.app)
      # Cloudinary: CLOUDINARY_URL 하나만 넣거나(권장), 아래 3개 분리 형식 중 택1
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # 포트원(아임포트) v1 REST API 키
      - key: PORTONE_IMP_KEY
        sync: false # 포트원 REST API 키
      - key: PORTONE_IMP_SECRET
        sync: false # 포트원 REST API Secret
